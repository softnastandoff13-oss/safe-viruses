<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Browser Pro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f0f14; color: #e1e1e6;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f0f14; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .logo {
            width: 120px; height: 120px; border-radius: 20px;
            margin-bottom: 20px; border: 3px solid #9933ff;
            box-shadow: 0 0 20px #9933ff;
        }
        .loader-bar { width: 200px; height: 6px; background-color: #222; border-radius: 3px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background-color: #9933ff; animation: load 2.5s forwards ease-in-out; }
        @keyframes load { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }

        #app-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .top-bar { padding: 10px; background-color: #161621; display: flex; gap: 10px; border-bottom: 1px solid #282a36; }
        .address-input { flex: 1; background-color: #1a1a24; border: 2px solid #3b3f54; border-radius: 12px; padding: 8px 15px; color: white; font-size: 14px; outline: none; }
        .address-input:focus { border-color: #9933ff; }

        .web-zone { flex: 1; width: 100%; border: none; background-color: #ffffff; }

        .bottom-bar { background-color: #161621; padding: 12px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #282a36; }
        .iphone-btn { background-color: #282a36; border: 1px solid #9933ff; color: white; padding: 10px 18px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .iphone-btn:hover { background-color: #9933ff; box-shadow: 0 0 10px #9933ff; }
        .btn-test-file { background-color: #ff3366; border-color: #ff3366; }

        /* ОКНО ПРЕДУПРЕЖДЕНИЯ И ОКНО ЗАГРУЗОК */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 10000; visibility: hidden; opacity: 0; transition: 0.3s; }
        .modal-box { background-color: #1a1a24; border: 2px solid #ff3366; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; box-shadow: 0 0 25px #ff3366; }
        .modal-box h2 { color: #ff3366; margin-top: 0; }
        
        /* Стиль панели списка загрузок */
        .downloads-box { border-color: #9933ff; box-shadow: 0 0 25px #9933ff; min-width: 350px; }
        .downloads-box h2 { color: #9933ff; }
        .downloads-list { text-align: left; max-height: 200px; overflow-y: auto; background: #111; padding: 10px; border-radius: 10px; margin-top: 15px; }
        .download-item { padding: 5px 0; border-bottom: 1px solid #222; font-size: 14px; color: #50fa7b; }

        .modal-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-confirm { background-color: #ff6600; border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background-color: #444; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img class="logo" src="https://yandex.net" alt="Gamer Logo">
        <h3 style="color: #9933ff; letter-spacing: 2px;">GAMER BROWSER CORE LAUNCHING...</h3>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="app-container">
        <div class="top-bar">
            <input type="text" id="url-field" class="address-input" value="https://google.com" placeholder="Введите поисковый запрос в Google...">
        </div>

        <iframe id="web-frame" class="web-zone" src="https://google.com"></iframe>

        <!-- Обновленная панель iPhone с кнопкой загрузок -->
        <div class="bottom-bar">
            <button class="iphone-btn" onclick="goHome()">🏠 Главная</button>
            <button class="iphone-btn" onclick="openDownloads()">📂 Загрузки</button>
            <button class="iphone-btn btn-test-file" onclick="triggerSecureDownload()">⬇ Скачать мод (.EXE)</button>
        </div>
    </div>

    <!-- Модалка вируса -->
    <div id="virus-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>⚠️ КРИТИЧЕСКАЯ УГРОЗА!</h2>
            <p>У данного приложения нет сертификата. Файл может заблокировать систему вирусом!</p>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="finalConfirm()">Скачать всё равно</button>
                <button class="btn-cancel" onclick="closeModal('virus-modal')">Отмена</button>
            </div>
        </div>
    </div>

    <!-- ОКНО ПРОСМОТРА ЗАГРУЗОК -->
    <div id="downloads-modal" class="modal-overlay">
        <div class="modal-box downloads-box">
            <h2>📂 Список загрузок</h2>
            <div class="downloads-list" id="downloads-container">
                <div style="color: #aaa; text-align: center;" id="empty-text">Список пуст</div>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal('downloads-modal')">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }, 2500);

        const iframe = document.getElementById('web-frame');
        const urlField = document.getElementById('url-field');
        
        // Массив для хранения истории скачанных файлов
        let downloadedFiles = [];

        urlField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let input = urlField.value;
                if (!input.startsWith('http://') && !input.startsWith('https://')) {
                    iframe.src = "https://google.com&q=" + encodeURIComponent(input);
                } else { iframe.src = input; }
            }
        });

        function goHome() { iframe.src = "https://google.com"; }

        function triggerSecureDownload() { showModal('virus-modal'); }
        
        function openDownloads() {
            showModal('downloads-modal');
            const container = document.getElementById('downloads-container');
            const emptyText = document.getElementById('empty-text');
            
            if(downloadedFiles.length > 0) {
                emptyText.style.display = 'none';
                container.innerHTML = '';
                downloadedFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'download-item';
                    item.innerText = `✔️ ${file} — Скачан успешно`;
                    container.appendChild(item);
                });
            }
        }

        function showModal(id) {
            const m = document.getElementById(id);
            m.style.visibility = 'visible'; m.style.opacity = '1';
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            m.style.opacity = '0'; setTimeout(() => m.style.visibility = 'hidden', 300);
        }

        function finalConfirm() {
            closeModal('virus-modal');
            
            // Добавляем файл в наш список загрузок
            downloadedFiles.push("game_installer.exe");
            
            // Имитация скачивания в систему
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent('Data'));
            element.setAttribute('download', 'game_installer.exe');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    </script>
</body>
</html>
