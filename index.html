<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer Browser Pro</title>
    <style>
        /* Геймерский темный стиль */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f14;
            color: #e1e1e6;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* 1. ГЕЙМЕРСКИЙ ЭКРАН ЗАГРУЗКИ ПРИ ЗАПУСКЕ */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0f0f14;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #9933ff;
            box-shadow: 0 0 20px #9933ff;
        }
        .loader-bar {
            width: 200px;
            height: 6px;
            background-color: #222;
            border-radius: 3px;
            overflow: hidden;
        }
        .loader-progress {
            width: 0%;
            height: 100%;
            background-color: #9933ff;
            animation: load 2.5s forwards ease-in-out;
        }
        @keyframes load {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС БРАУЗЕРА */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Строка поиска (Сверху) */
        .top-bar {
            padding: 10px;
            background-color: #161621;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #282a36;
        }
        .address-input {
            flex: 1;
            background-color: #1a1a24;
            border: 2px solid #3b3f54;
            border-radius: 12px;
            padding: 8px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .address-input:focus {
            border-color: #9933ff;
        }

        /* Веб-зона отображения сайтов */
        .web-zone {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }

        /* ЗЕРКАЛЬНЫЙ ИНТЕРФЕЙС IPHONE (Кнопки внизу) */
        .bottom-bar {
            background-color: #161621;
            padding: 12px;
            display: flex;
            justify-content: center;
            gap: 25px;
            border-top: 1px solid #282a36;
        }
        .iphone-btn {
            background-color: #282a36;
            border: 1px solid #9933ff;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .iphone-btn:hover {
            background-color: #9933ff;
            box-shadow: 0 0 10px #9933ff;
        }
        .btn-test-file {
            background-color: #ff3366;
            border-color: #ff3366;
        }

        /* ОКНО ПРЕДУПРЕЖДЕНИЯ О ВИРУСЕ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        .modal-box {
            background-color: #1a1a24;
            border: 2px solid #ff3366;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 25px #ff3366;
        }
        .modal-box h2 { color: #ff3366; margin-top: 0; }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-confirm { background-color: #ff6600; border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background-color: #444; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. Экран загрузки при старте -->
    <div id="loading-screen">
        <!-- Ваша картинка логотипа -->
        <img class="logo" src="https://yandex.net" alt="Gamer Logo">
        <h3 style="color: #9933ff; letter-spacing: 2px;">GAMER BROWSER CORE LAUNCHING...</h3>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app-container">
        <!-- Верхняя поисковая строка -->
        <div class="top-bar">
            <input type="text" id="url-field" class="address-input" value="https://google.com" placeholder="Введите поисковый запрос в Google...">
        </div>

        <!-- Рабочее окно просмотра (Сайты отображаются здесь) -->
        <iframe id="web-frame" class="web-zone" src="https://google.com"></iframe>

        <!-- Зеркальная панель iPhone (Внизу) -->
        <div class="bottom-bar">
            <button class="iphone-btn" onclick="goHome()">🏠 Главная</button>
            <button class="iphone-btn" onclick="alert('История очищена (Режим Инкогнито активен)')">🔒 Инкогнито</button>
            <button class="iphone-btn btn-test-file" onclick="triggerSecureDownload()">⬇ Скачать мод (.EXE)</button>
        </div>
    </div>

    <!-- Двухэтапное окно вирусного предупреждения -->
    <div id="virus-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>⚠️ КРИТИЧЕСКАЯ УГРОЗА!</h2>
            <p>У данного приложения отсутствует цифровой сертификат безопасности. Запуск этого файла может заблокировать вашу систему вирусом!</p>
            <p>Вы действительно хотите принудительно подтвердить скачивание?</p>
            <div class="modal-buttons">
                <button class="btn-confirm" onclick="finalConfirm()">Скачать и подтвердить всё равно</button>
                <button class="btn-cancel" onclick="closeModal()">Отмена (Безопасно)</button>
            </div>
        </div>
    </div>

    <script>
        // Убираем экран загрузки через 2.5 секунды
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }, 2500);

        const iframe = document.getElementById('web-frame');
        const urlField = document.getElementById('url-field');

        // Обработка ввода в адресную строку (строго в чистый Google без Дзена)
        urlField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let input = urlField.value;
                if (!input.startsWith('http://') && !input.startsWith('https://')) {
                    // Превращаем текст в чистый поисковый запрос Google
                    iframe.src = "https://google.com&q=" + encodeURIComponent(input);
                } else {
                    iframe.src = input;
                }
            }
        });

        function goHome() {
            iframe.src = "https://google.com";
            urlField.value = "https://google.com";
        }

        // Показ кастомного окна предупреждения о вирусе
        function triggerSecureDownload() {
            const modal = document.getElementById('virus-modal');
            modal.style.visibility = 'visible';
            modal.style.opacity = '1';
        }

        function closeModal() {
            const modal = document.getElementById('virus-modal');
            modal.style.opacity = '0';
            setTimeout(() => modal.style.visibility = 'hidden', 300);
        }

        // Финальное оранжевое подтверждение скачивания файла
        function finalConfirm() {
            closeModal();
            alert("Проверка пройдена. Начинается прямое скачивание чистого файла game_installer.exe в ваш браузер!");
            
            // Запуск реальной генерации и скачивания тестового файла
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent('Gamer Browser Secured Executable Data'));
            element.setAttribute('download', 'game_installer.exe');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    </script>
</body>
</html>
